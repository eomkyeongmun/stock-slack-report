name: 주간 주식 분석

on:
  schedule:
    - cron: '10 22 * * 0'  # 월요일 오전 7시 10분 KST
  workflow_dispatch:

jobs:
  weekly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests boto3

      - name: Weekly analysis and send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python3 << 'EOF'
          import json, os, boto3, glob
          import requests

          SLACK_WEBHOOK_URL = os.environ['SLACK_WEBHOOK_URL']

          files = sorted(glob.glob('data/**/*.json', recursive=True))[-5:]
          if not files:
              print("데이터 없음, 건너뜀")
              exit(0)

          weekly_data = []
          for f in files:
              with open(f, encoding='utf-8') as fp:
                  weekly_data.append(json.load(fp))

          start_date = weekly_data[0]['date']
          end_date = weekly_data[-1]['date']

          # 모의투자 수익률 계산
          portfolio_section = ""
          portfolio_path = 'portfolio.json'
          if os.path.exists(portfolio_path):
              with open(portfolio_path, encoding='utf-8') as f:
                  portfolio = json.load(f)

              # 최신 종가 (가장 최근 데이터 파일)
              latest_prices = {}
              for s in weekly_data[-1]['kospi']:
                  latest_prices[s['ticker']] = s['close']

              total_invested = 0
              total_current = 0
              stock_summary = {}

              for p in portfolio:
                  ticker = p['ticker']
                  buy_price = p['buy_price']
                  current_price = latest_prices.get(ticker, buy_price)
                  invested = buy_price
                  current = current_price

                  total_invested += invested
                  total_current += current

                  name = p['name']
                  if name not in stock_summary:
                      stock_summary[name] = {'invested': 0, 'current': 0, 'count': 0}
                  stock_summary[name]['invested'] += invested
                  stock_summary[name]['current'] += current
                  stock_summary[name]['count'] += 1

              total_pnl = total_current - total_invested
              total_pnl_pct = total_pnl / total_invested * 100 if total_invested > 0 else 0
              total_sign = "+" if total_pnl >= 0 else ""

              lines_pf = [f"*💼 모의투자 수익률 현황 (기준: {end_date})*"]
              lines_pf.append(f"총 투자금: {total_invested:,}원 | 평가금액: {total_current:,}원")
              lines_pf.append(f"총 손익: {total_sign}{total_pnl:,}원 ({total_sign}{total_pnl_pct:.2f}%)")
              lines_pf.append("")

              sorted_stocks = sorted(stock_summary.items(), key=lambda x: (x[1]['current']-x[1]['invested'])/x[1]['invested'] if x[1]['invested'] else 0, reverse=True)
              lines_pf.append("*종목별 손익*")
              for name, v in sorted_stocks:
                  pnl = v['current'] - v['invested']
                  pnl_pct = pnl / v['invested'] * 100 if v['invested'] else 0
                  sign = "+" if pnl >= 0 else ""
                  emoji = "📈" if pnl >= 0 else "📉"
                  lines_pf.append(f"{emoji} {name} ({v['count']}주) | {sign}{pnl:,}원 ({sign}{pnl_pct:.2f}%)")

              portfolio_section = "\n".join(lines_pf)

          # 일별 TOP3 요약
          daily_summary = []
          for day in weekly_data:
              top3 = day['kospi'][:3]
              daily_summary.append(
                  f"[{day['date']}] " + ", ".join(f"{s['name']}({s['change_pct']:+.1f}%)" for s in top3)
              )

          # 주간 평균 등락률 (KOSPI)
          stock_changes = {}
          for day in weekly_data:
              for s in day['kospi']:
                  name = s['name']
                  if name not in stock_changes:
                      stock_changes[name] = []
                  stock_changes[name].append(s['change_pct'])

          avg_change = {k: sum(v)/len(v) for k, v in stock_changes.items() if len(v) >= 2}
          top_gainers = sorted(avg_change.items(), key=lambda x: x[1], reverse=True)[:5]
          top_losers = sorted(avg_change.items(), key=lambda x: x[1])[:5]

          gainer_text = ", ".join(f"{n}({v:+.1f}%)" for n, v in top_gainers)
          loser_text = ", ".join(f"{n}({v:+.1f}%)" for n, v in top_losers)
          daily_text = "\n".join(daily_summary)

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          prompt = (
              f"지난 주({start_date}~{end_date}) 한국 KOSPI 주간 데이터 분석해줘. 한국어로. 이모지 써도 됨.\n\n"
              f"일별 TOP3 등락:\n{daily_text}\n\n"
              f"주간 평균 상승 TOP5: {gainer_text}\n"
              f"주간 평균 하락 TOP5: {loser_text}\n\n"
              "형식: 불릿 5개, 핵심 인사이트 + 이번주 주목 포인트 포함."
          )

          response = bedrock.invoke_model(
              modelId='us.anthropic.claude-sonnet-4-5-20250929-v1:0',
              contentType='application/json',
              accept='application/json',
              body=json.dumps({
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": 600,
                  "messages": [{"role": "user", "content": prompt}]
              })
          )
          ai_analysis = json.loads(response['body'].read())['content'][0]['text']

          message = (
              f"*📅 주간 KOSPI 분석 — {start_date} ~ {end_date}*\n\n"
              f"*🤖 AI 주간 분석*\n{ai_analysis}\n\n"
              + (f"{portfolio_section}\n\n" if portfolio_section else "")
              + "_출처: KRX_"
          )
          print(message)

          resp = requests.post(SLACK_WEBHOOK_URL, json={"text": message})
          print(f"Slack: {resp.status_code}")
          if resp.status_code != 200:
              exit(1)
          EOF
