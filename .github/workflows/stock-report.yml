name: 주식 시총 리포트

on:
  schedule:
    - cron: '50 23 * * 0-4'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install yfinance requests

      - name: Fetch stock data & send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'EOF'
          import yfinance as yf
          import requests, os
          from datetime import datetime

          SLACK_WEBHOOK_URL = os.environ['SLACK_WEBHOOK_URL']

          KOSPI = [
              ('005930.KS', '삼성전자'),
              ('000660.KS', 'SK하이닉스'),
              ('207940.KS', '삼성바이오로직스'),
              ('005380.KS', '현대차'),
              ('000270.KS', '기아'),
              ('068270.KS', '셀트리온'),
              ('051910.KS', 'LG화학'),
              ('035420.KS', 'NAVER'),
              ('028260.KS', '삼성물산'),
              ('012330.KS', '현대모비스'),
          ]

          KOSDAQ = [
              ('247540.KQ', '에코프로비엠'),
              ('086520.KQ', '에코프로'),
              ('028300.KQ', 'HLB'),
              ('196170.KQ', '알테오젠'),
              ('091990.KQ', '셀트리온헬스케어'),
              ('036570.KQ', '엔씨소프트'),
              ('263750.KQ', '펄어비스'),
              ('357780.KQ', '솔브레인'),
              ('145020.KQ', '휴젤'),
              ('293490.KQ', '카카오게임즈'),
          ]

          def get_data(ticker_list):
              symbols = [t[0] for t in ticker_list]
              names = {t[0]: t[1] for t in ticker_list}
              syms_str = ' '.join(symbols)

              hist = yf.download(syms_str, period='2d', progress=False, auto_adjust=True)
              close = hist['Close']

              results = []
              for sym in symbols:
                  try:
                      price = float(close[sym].iloc[-1])
                      prev  = float(close[sym].iloc[-2])
                      change = (price - prev) / prev * 100
                      info = yf.Ticker(sym).fast_info
                      cap = getattr(info, 'market_cap', 0) or 0
                      results.append({'name': names[sym], 'price': price, 'change': change, 'cap': cap})
                  except Exception as e:
                      print(f"skip {sym}: {e}")
              return sorted(results, key=lambda x: x['cap'], reverse=True)

          def fmt_cap(v):
              return f"{v/1_000_000_000_000:.1f}조"

          def fmt_change(v):
              if v > 0: return f"📈 +{v:.2f}%"
              elif v < 0: return f"📉 {v:.2f}%"
              else: return "➡️ 0.00%"

          today = datetime.now().strftime('%Y-%m-%d')
          lines = [f"*📊 한국 주식 시총순위 & 등락률 — {today}*", ""]

          for label, emoji, ticker_list in [('KOSPI', '🔵', KOSPI), ('KOSDAQ', '🟢', KOSDAQ)]:
              stocks = get_data(ticker_list)
              lines.append(f"*{emoji} {label} 시총 TOP 10*")
              for i, s in enumerate(stocks, 1):
                  cap_str = fmt_cap(s['cap']) if s['cap'] else 'N/A'
                  lines.append(f"{i}. {s['name']} | {s['price']:,.0f}원 | 시총 {cap_str} | {fmt_change(s['change'])}")
              lines.append("")

          lines.append("_출처: Yahoo Finance_")
          message = "\n".join(lines)
          print(message)

          resp = requests.post(SLACK_WEBHOOK_URL, json={"text": message})
          print(f"Slack: {resp.status_code} {resp.text}")
          if resp.status_code != 200:
              exit(1)
          EOF
