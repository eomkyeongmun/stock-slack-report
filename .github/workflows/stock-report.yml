name: 주식 시총 리포트

on:
  schedule:
    - cron: '20 23 * * 0-4'  # 매일 08:20 KST (월~금)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pykrx requests boto3

      - name: Fetch stock data, save JSON, analyze with Claude, send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          python3 << 'EOF'
          import requests, json, os, boto3
          from datetime import datetime, timedelta
          from pykrx import stock

          SLACK_WEBHOOK_URL = os.environ['SLACK_WEBHOOK_URL']

          d = datetime.now() - timedelta(days=1)
          while d.weekday() >= 5:
              d -= timedelta(days=1)
          prev = d.strftime('%Y%m%d')
          prev_display = d.strftime('%Y-%m-%d')
          month_dir = d.strftime('%Y-%m')

          def get_top50(market):
              try:
                  df = stock.get_market_cap(prev, market=market)
                  df = df.sort_values('시가총액', ascending=False).head(50)
                  try:
                      ohlcv = stock.get_market_ohlcv(prev, market=market)
                      df['등락률'] = ohlcv['등락률']
                  except:
                      df['등락률'] = 0
                  return df
              except Exception as e:
                  print(f"Error fetching {market}: {e}")
                  return None

          def get_net_purchases(investor):
              try:
                  return stock.get_market_net_purchases_of_equities_by_ticker(
                      prev, prev, 'KOSPI', investor
                  )
              except Exception as e:
                  print(f"Error fetching net purchases {investor}: {e}")
                  return None

          def fmt_cap(v):
              return f"{v/1_000_000_000_000:.1f}조"

          def fmt_money(v):
              b = abs(v) / 100_000_000
              sign = "+" if v > 0 else "-"
              if b >= 1000:
                  return f"{sign}{b/1000:.1f}조"
              return f"{sign}{b:.0f}억"

          def fmt_change(v):
              try:
                  v = float(v)
                  if v > 0: return f"📈 +{v:.2f}%"
                  elif v < 0: return f"📉 {v:.2f}%"
                  else: return "➡️ 0.00%"
              except:
                  return "➡️ -"

          kospi_df = get_top50('KOSPI')
          foreign_net = get_net_purchases('외국인')
          inst_net = get_net_purchases('기관합계')

          foreign_top10 = []
          inst_top10 = []
          if foreign_net is not None and not foreign_net.empty:
              for ticker, row in foreign_net.nlargest(10, '순매수거래대금').iterrows():
                  foreign_top10.append((stock.get_market_ticker_name(ticker), int(row['순매수거래대금'])))
          if inst_net is not None and not inst_net.empty:
              for ticker, row in inst_net.nlargest(10, '순매수거래대금').iterrows():
                  inst_top10.append((stock.get_market_ticker_name(ticker), int(row['순매수거래대금'])))

          # JSON 저장
          data = {
              "date": prev_display,
              "kospi": [],
              "foreign_net_buy": [{"name": n, "amount": v} for n, v in foreign_top10],
              "inst_net_buy": [{"name": n, "amount": v} for n, v in inst_top10]
          }
          if kospi_df is not None:
              for i, (ticker, row) in enumerate(kospi_df.iterrows(), 1):
                  name = stock.get_market_ticker_name(ticker)
                  data["kospi"].append({
                      "rank": i,
                      "ticker": ticker,
                      "name": name,
                      "close": int(row.get('종가', 0)),
                      "market_cap": int(row.get('시가총액', 0)),
                      "change_pct": round(float(row.get('등락률', 0)), 2)
                  })

          os.makedirs(f"data/{month_dir}", exist_ok=True)
          json_path = f"data/{month_dir}/{prev_display}.json"
          with open(json_path, 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          print(f"Saved {json_path}")

          # Claude 분석
          summary_lines = ["=== KOSPI TOP 10 ==="]
          if kospi_df is not None:
              for i, (ticker, row) in enumerate(kospi_df.head(10).iterrows(), 1):
                  name = stock.get_market_ticker_name(ticker)
                  summary_lines.append(
                      f"{i}. {name} 시총:{fmt_cap(row['시가총액'])} 등락:{row.get('등락률',0):.2f}%"
                  )
          if foreign_top10:
              summary_lines.append("=== 외국인 순매수 TOP10 ===")
              for name, amt in foreign_top10:
                  summary_lines.append(f"{name}: {fmt_money(amt)}")
          if inst_top10:
              summary_lines.append("=== 기관 순매수 TOP10 ===")
              for name, amt in inst_top10:
                  summary_lines.append(f"{name}: {fmt_money(amt)}")
          summary_text = "\n".join(summary_lines)

          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          prompt = (
              f"{prev_display} 한국 KOSPI 시장 데이터를 보고 3줄로 핵심만 분석해줘. 외국인/기관 수급도 반영해줘. 한국어로. 이모지 써도 됨.\n\n"
              + summary_text
              + "\n\n형식: 불릿 3개, 각 1줄, 핵심 인사이트만."
          )

          response = bedrock.invoke_model(
              modelId='us.anthropic.claude-sonnet-4-5-20250929-v1:0',
              contentType='application/json',
              accept='application/json',
              body=json.dumps({
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": 300,
                  "messages": [{"role": "user", "content": prompt}]
              })
          )
          ai_analysis = json.loads(response['body'].read())['content'][0]['text']

          # Slack 메시지
          lines = [f"*📊 KOSPI 시총순위 & 등락률 — {prev_display}*", ""]
          if kospi_df is None:
              lines.append("KOSPI 데이터 없음")
          else:
              lines.append("*🔵 KOSPI 시총 TOP 50*")
              for i, (ticker, row) in enumerate(kospi_df.iterrows(), 1):
                  name = stock.get_market_ticker_name(ticker)
                  price = f"{int(row.get('종가', 0)):,}원" if row.get('종가', 0) else "-"
                  cap = fmt_cap(row['시가총액'])
                  change = fmt_change(row.get('등락률', 0))
                  lines.append(f"{i}. {name} | {price} | 시총 {cap} | {change}")
              lines.append("")

          if foreign_top10:
              lines.append("*💰 외국인 순매수 TOP10 (KOSPI)*")
              for i, (name, amt) in enumerate(foreign_top10, 1):
                  lines.append(f"{i}. {name} | {fmt_money(amt)}")
              lines.append("")

          if inst_top10:
              lines.append("*🏦 기관 순매수 TOP10 (KOSPI)*")
              for i, (name, amt) in enumerate(inst_top10, 1):
                  lines.append(f"{i}. {name} | {fmt_money(amt)}")
              lines.append("")

          lines.append(f"*🤖 AI 분석*\n{ai_analysis}")
          lines.append("\n_출처: KRX_")

          message = "\n".join(lines)
          print(message)

          resp = requests.post(SLACK_WEBHOOK_URL, json={"text": message})
          print(f"Slack: {resp.status_code}")
          if resp.status_code != 200:
              exit(1)
          EOF

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u +'%Y-%m-%d') 시총 스냅샷"
          git push
