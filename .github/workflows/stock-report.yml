name: 주식 시총 리포트

on:
  schedule:
    - cron: '50 23 * * 0-4'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install pykrx requests boto3

      - name: Fetch stock data, analyze with Claude, send to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python3 << 'EOF'
          import requests, json, os, boto3
          from datetime import datetime, timedelta
          from pykrx import stock

          SLACK_WEBHOOK_URL = os.environ['SLACK_WEBHOOK_URL']

          today = datetime.now().strftime('%Y%m%d')
          today_display = datetime.now().strftime('%Y-%m-%d')

          # 전일 영업일 (주말이면 금요일)
          d = datetime.now() - timedelta(days=1)
          while d.weekday() >= 5:
              d -= timedelta(days=1)
          prev = d.strftime('%Y%m%d')

          def get_top50(market):
              try:
                  df = stock.get_market_cap(today, market=market)
                  if df.empty:
                      df = stock.get_market_cap(prev, market=market)
                  df = df.sort_values('시가총액', ascending=False).head(50)
                  df['등락률'] = stock.get_market_ohlcv(today if not df.empty else prev, market=market)['등락률']
                  return df
              except:
                  df = stock.get_market_cap(prev, market=market)
                  df = df.sort_values('시가총액', ascending=False).head(50)
                  try:
                      ohlcv = stock.get_market_ohlcv(prev, market=market)
                      df['등락률'] = ohlcv['등락률']
                  except:
                      df['등락률'] = 0
                  return df

          def fmt_cap(v):
              return f"{v/1_000_000_000_000:.1f}조"

          def fmt_change(v):
              try:
                  v = float(v)
                  if v > 0: return f"📈 +{v:.2f}%"
                  elif v < 0: return f"📉 {v:.2f}%"
                  else: return "➡️ 0.00%"
              except:
                  return "➡️ -"

          # 데이터 수집
          kospi_df = get_top50('KOSPI')
          kosdaq_df = get_top50('KOSDAQ')

          # 텍스트 요약 (Claude 분석용)
          summary_lines = []
          for label, df in [('KOSPI', kospi_df), ('KOSDAQ', kosdaq_df)]:
              summary_lines.append(f"=== {label} TOP 10 ===")
              for i, (ticker, row) in enumerate(df.head(10).iterrows(), 1):
                  name = stock.get_market_ticker_name(ticker)
                  summary_lines.append(f"{i}. {name} 시총:{fmt_cap(row['시가총액'])} 등락:{row.get('등락률',0):.2f}%")

          summary_text = "\n".join(summary_lines)

          # Claude via Bedrock 분석
          bedrock = boto3.client('bedrock-runtime', region_name='us-east-1')
          prompt = f"""오늘({today_display}) 한국 주식 시장 데이터를 보고 3줄로 핵심만 분석해줘. 한국어로. 이모지 써도 됨.

{summary_text}

형식: 불릿 3개, 각 1줄, 핵심 인사이트만."""

          response = bedrock.invoke_model(
              modelId='us.anthropic.claude-sonnet-4-5-20250929-v1:0',
              contentType='application/json',
              accept='application/json',
              body=json.dumps({
                  "anthropic_version": "bedrock-2023-05-31",
                  "max_tokens": 300,
                  "messages": [{"role": "user", "content": prompt}]
              })
          )
          ai_analysis = json.loads(response['body'].read())['content'][0]['text']

          # 슬랙 메시지 조립
          lines = [f"*📊 한국 주식 시총순위 & 등락률 — {today_display}*", ""]

          for label, emoji, df in [('KOSPI', '🔵', kospi_df), ('KOSDAQ', '🟢', kosdaq_df)]:
              lines.append(f"*{emoji} {label} 시총 TOP 50*")
              for i, (ticker, row) in enumerate(df.iterrows(), 1):
                  name = stock.get_market_ticker_name(ticker)
                  price = f"{int(row.get('종가', 0)):,}원" if row.get('종가', 0) else "-"
                  cap = fmt_cap(row['시가총액'])
                  change = fmt_change(row.get('등락률', 0))
                  lines.append(f"{i}. {name} | {price} | 시총 {cap} | {change}")
              lines.append("")

          lines.append(f"*🤖 AI 분석*\n{ai_analysis}")
          lines.append("\n_출처: KRX_")

          message = "\n".join(lines)
          print(message)

          resp = requests.post(SLACK_WEBHOOK_URL, json={"text": message})
          print(f"Slack: {resp.status_code}")
          if resp.status_code != 200:
              exit(1)
          EOF
